# Render.com sets PORT automatically; fall back to 8080 locally
server.port=${PORT:8080}

# File upload limits - raised to 50MB to support larger datasets
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Tomcat connector limit (must match or exceed multipart limits above)
server.tomcat.max-http-form-post-size=52428800
